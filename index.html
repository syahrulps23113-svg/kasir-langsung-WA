
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kasir Print</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 10px;
  max-width: 400px;
  margin: auto;
}

input, select, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  background: green;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: darkgreen;
}
</style>

</head>
<body>

<div class="container">
  <h2>Kasir Print</h2>

  <!-- INPUT -->
  <input type="text" id="nama" list="listNama" placeholder="Nama Pelanggan">
  <datalist id="listNama"></datalist>

  <input type="text" id="nomor" list="listNomor" placeholder="Nomor WhatsApp">
  <datalist id="listNomor"></datalist>

  <input type="number" id="jumlah" placeholder="Jumlah Lembar">

  <select id="jenis">
    <option value="Hitam Putih">Hitam Putih</option>
    <option value="Warna">Warna</option>
  </select>

  <button onclick="kirim()">Simpan & Kirim WA</button>
</div>

<script>

// 🔥 LOAD HISTORY PELANGGAN
function loadPelanggan(){
  let data = JSON.parse(localStorage.getItem("pelanggan")) || [];

  let listNama = document.getElementById("listNama");
  let listNomor = document.getElementById("listNomor");

  listNama.innerHTML = "";
  listNomor.innerHTML = "";

  data.forEach(p => {
    listNama.innerHTML += `<option value="${p.nama}">`;
    listNomor.innerHTML += `<option value="${p.nomor}">`;
  });
}

// 🔥 SIMPAN PELANGGAN
function simpanPelanggan(nama, nomor){
  let data = JSON.parse(localStorage.getItem("pelanggan")) || [];

  let sudahAda = data.find(p => p.nomor === nomor);

  if(!sudahAda){
    data.push({nama, nomor});
    localStorage.setItem("pelanggan", JSON.stringify(data));
  }
}

// 🔥 AUTO ISI NOMOR SAAT PILIH NAMA
document.getElementById("nama").addEventListener("change", function(){
  let data = JSON.parse(localStorage.getItem("pelanggan")) || [];
  let namaDipilih = this.value;

  let found = data.find(p => p.nama === namaDipilih);

  if(found){
    document.getElementById("nomor").value = found.nomor;
  }
});

// 🔥 VALIDASI NOMOR
function validasiNomor(nomor){
  nomor = nomor.replace(/[^0-9]/g, "");

  if(nomor.startsWith("08")){
    nomor = "62" + nomor.slice(1);
  }

  if(!nomor.startsWith("62")){
    return false;
  }

  return nomor;
}

// 🔥 FUNGSI KIRIM
function kirim(){

  let nama = document.getElementById("nama").value;
  let nomor = document.getElementById("nomor").value;
  let jumlah = document.getElementById("jumlah").value;
  let jenis = document.getElementById("jenis").value;

  if(!nama || !nomor || !jumlah){
    alert("Lengkapi data dulu!");
    return;
  }

  nomor = validasiNomor(nomor);
  if(!nomor){
    alert("Nomor tidak valid!");
    return;
  }

  let harga = (jenis === "Warna") ? 500 : 200;
  let total = jumlah * harga;

  // 🔥 ID & WAKTU
  let id = "TRX-" + Date.now();
  let waktu = new Date().toLocaleString("id-ID");

  // 🔥 FORMAT PESAN
  let pesan = `
🧾 STRUK PRINT

ID: ${id}
Waktu: ${waktu}

Nama: ${nama}
Produk: ${jenis}
Jumlah: ${jumlah} lembar

💰 Total: Rp${total}

Terima kasih 🙏
`;

  // 🔥 SIMPAN KE HISTORY
  simpanPelanggan(nama, nomor);

  // 🔥 KIRIM KE WHATSAPP
  let url = `https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`;
  window.open(url, "_blank");

  // 🔥 KIRIM KE SPREADSHEET (GANTI URL KAMU)
  fetch("https://script.google.com/macros/s/AKfycbwDTDKHb026zCgpYBHGLVXogryI7yK2iUfRXbU4qbGyk1qXdslYenGfBXfIw5aCk1JbMQ/exec", {
    method: "POST",
    body: JSON.stringify({
      id,
      waktu,
      nama,
      nomor,
      jenis,
      jumlah,
      total
    })
  });

  alert("Transaksi berhasil!");
}

// 🔥 LOAD SAAT HALAMAN DIBUKA
loadPelanggan();

</script>

</body>
</html>
