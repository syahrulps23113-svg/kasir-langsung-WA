<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir Printing</title>

<style>
body{
  font-family:Arial;
  padding:15px;
  background:#f5f5f5;
  margin:0;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  margin-bottom:15px;
}

*{ box-sizing:border-box; }

html, body{ overflow-x:hidden; }

.row{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:8px;
  width:100%;
}

.row select,
.row input{
  width:100%;
}

select, input{
  padding:12px;
  font-size:16px;
  border-radius:6px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:15px;
  font-size:18px;
  background:#211a9b;
  color:white;
  border:none;
  border-radius:8px;
  margin-top:10px;
}

.resetBtn{ background:#999; }

.totalBox{
  font-size:30px;
  font-weight:bold;
  text-align:center;
  margin:15px 0;
  color:#211a9b;
}

@media(min-width:600px){
  .row{ flex-wrap:nowrap; }
  .row select{ flex:2; }
  .row input{ flex:1; }
}
</style>
</head>

<body>

<div class="card">
<h3>Nama Pelanggan</h3>
<!-- TAMBAHAN -->
<input type="text" id="nama" list="listNama">
<datalist id="listNama"></datalist>
</div>

<div class="card">
<h3>Nomor WhatsApp</h3>
<!-- TAMBAHAN -->
<input type="text" id="nomor" list="listNomor" placeholder="08xxxx">
<datalist id="listNomor"></datalist>

<label><input type="checkbox" id="kirimWA"> Kirim ke WhatsApp</label>
</div>

<div class="card">
<h3>Produk</h3>

<div id="produkList"></div>

<button onclick="tambahBaris()">+ Tambah Produk</button>

<div class="totalBox">
Rp <span id="totalSemua">0</span>
</div>

<label>Pembayaran</label>
<select id="pembayaran">
<option>Tunai</option>
<option>E-money</option>
</select>

<button onclick="kirim()">Simpan Transaksi</button>
<button class="resetBtn" onclick="resetKasir()">Reset</button>

</div>

<script>

// ================= TAMBAHAN (RIWAYAT) =================

function getHistory(){
  return JSON.parse(localStorage.getItem("historyPelanggan")) || [];
}

function saveHistory(nama, nomor){
  if(!nama || !nomor) return;

  let data = getHistory();

  let exist = data.find(p => p.nomor === nomor);

  if(!exist){
    data.push({nama, nomor});
    localStorage.setItem("historyPelanggan", JSON.stringify(data));
  }
}

function loadHistory(){
  let data = getHistory();

  let listNama = document.getElementById("listNama");
  let listNomor = document.getElementById("listNomor");

  listNama.innerHTML = "";
  listNomor.innerHTML = "";

  data.forEach(p=>{
    listNama.innerHTML += `<option value="${p.nama}">`;
    listNomor.innerHTML += `<option value="${p.nomor}">`;
  });
}

// auto isi nomor dari nama
document.getElementById("nama").addEventListener("change", function(){
  let data = getHistory();
  let found = data.find(p => p.nama === this.value);
  if(found){
    document.getElementById("nomor").value = found.nomor;
  }
});

// auto isi nama dari nomor
document.getElementById("nomor").addEventListener("change", function(){
  let data = getHistory();
  let found = data.find(p => p.nomor === this.value);
  if(found){
    document.getElementById("nama").value = found.nama;
  }
});

// =====================================================

function formatRupiah(angka){
return new Intl.NumberFormat("id-ID").format(angka);
}

function hargaProduk(jenis){
if(jenis=="Hitam Putih") return 250;
if(jenis=="Warna") return 1000;
if(jenis=="Full Warna") return 1500;
return 0;
}

function tambahBaris(){
let div = document.createElement("div");
div.className="row";

div.innerHTML = `
<select onchange="updateTotal()">
<option>Hitam Putih</option>
<option>Warna</option>
<option>Full Warna</option>
</select>

<input type="number" placeholder="Jumlah" oninput="updateTotal()">
<input type="text" placeholder="Total" readonly>
`;

document.getElementById("produkList").appendChild(div);
}

function updateTotal(){
let rows = document.querySelectorAll("#produkList .row");
let totalSemua = 0;

rows.forEach(row=>{
let jenis = row.children[0].value;
let unit = parseInt(row.children[1].value) || 0;

let harga = hargaProduk(jenis);
let total = harga * unit;

row.children[2].value = formatRupiah(total);
totalSemua += total;
});

document.getElementById("totalSemua").innerText = formatRupiah(totalSemua);
}

function validasiNomor(nomor){
return /^08[0-9]{8,11}$/.test(nomor);
}

function kirim(){

let rows = document.querySelectorAll("#produkList .row");
let nama = document.getElementById("nama").value || "-";
let nomor = document.getElementById("nomor").value;

// TAMBAHAN SIMPAN HISTORY
saveHistory(nama, nomor);
loadHistory();

let kirimWA = document.getElementById("kirimWA").checked;
let pembayaran = document.getElementById("pembayaran").value;
let waktu = new Date().toLocaleString("id-ID");
let id = "TRX-" + Date.now();

let teksProduk = "";
let totalItem = 0;
let totalSemua = 0;

rows.forEach(row=>{
let produk = row.children[0].value;
let unit = parseInt(row.children[1].value) || 0;

if(unit == 0) return;

let harga = hargaProduk(produk);
let total = harga * unit;

teksProduk += `${produk} (${unit})\n`;
totalItem += unit;
totalSemua += total;

fetch("https://script.google.com/macros/s/AKfycbzW-vozb6bFd03TrNLs5OWLFofUhyU99WTFPlvE0Kgx9aFbYLhzFGyTU-KFl9-aLTABwA/exec",{
method:"POST",
body:JSON.stringify({
id:id,
nama:nama,
nomor:nomor,
waktu:waktu,
produk:produk,
unit:unit,
harga:harga,
total:total,
pembayaran:pembayaran
})
});

});

if(kirimWA){

if(!validasiNomor(nomor)){
alert("Nomor tidak valid!");
return;
}

let pesan =
`🧾 STRUK PRINT PHYNIX CREATOR🐦‍🔥

ID: ${id}
Waktu: ${waktu}

Nama: ${nama}
Produk:
${teksProduk}

Jumlah: ${totalItem} lembar


💰 Total: *Rp${formatRupiah(totalSemua)}*

Terima kasih telah menggunakan jasa kami🙏`;

let nomorFix = nomor.replace(/^0/, "62");
let url = `https://wa.me/${nomorFix}?text=${encodeURIComponent(pesan)}`;
window.open(url, "_blank");
}

alert("Transaksi tersimpan");
resetKasir();
}

function resetKasir(){
document.getElementById("produkList").innerHTML="";
document.getElementById("nama").value="";
document.getElementById("nomor").value="";
document.getElementById("totalSemua").innerText="0";
tambahBaris();
}

// TAMBAHAN LOAD HISTORY SAAT AWAL
loadHistory();

tambahBaris();
</script>

</body>
</html>
